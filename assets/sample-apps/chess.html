<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHESS • CHECKMATE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            font-family: 'Bebas Neue', 'Arial Black', sans-serif;
            background: #000;
            overflow-x: hidden;
            overflow-y: auto;
            color: white;
            position: relative;
        }
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,215,0,0.03) 10px, rgba(255,215,0,0.03) 20px),
                radial-gradient(circle at 20% 50%, rgba(255,215,0,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(255,215,0,0.1) 0%, transparent 50%);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @supports (-webkit-touch-callout: none) {
            .container {
                min-height: -webkit-fill-available;
            }
        }
        .header {
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .title {
            font-size: 2em;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 3px 3px 0 #ffd700;
            position: relative;
            white-space: nowrap;
        }
        .title::before {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 60%;
            height: 3px;
            background: #ffd700;
            transform: skewX(-20deg);
        }
        .turn-display {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            padding: 8px 15px;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            font-size: 1em;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
            white-space: nowrap;
            color: #000;
            font-weight: bold;
        }
        .game-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            flex: 1;
        }
        .board-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            background: #ffd700;
            padding: 6px;
            border: 3px solid #ffd700;
            box-shadow: 
                0 0 0 2px #000,
                0 0 0 5px #ffd700,
                0 5px 20px rgba(255,215,0,0.5),
                inset 0 0 20px rgba(0,0,0,0.5);
            width: 100%;
        }
        .square {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5em, 8vw, 3em);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: #1a1a1a;
            border: 2px solid transparent;
        }
        .square.light {
            background: #fffacd;
        }
        .square.dark {
            background: #dbe20a;
        }
        .square.last-move {
            background: rgba(255, 215, 0, 0.4) !important;
            animation: moveFlash 0.8s ease-out;
        }
        @keyframes moveFlash {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.8);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(255, 215, 0, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 215, 0, 0);
            }
        }
        .square .white-piece {
            color: #f5f5f5;
            text-shadow: 
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000,
                2px 2px 0 #000,
                -2px 0 0 #000,
                2px 0 0 #000,
                0 -2px 0 #000,
                0 2px 0 #000;
        }
        .square .black-piece {
            color: #555555;
            text-shadow: 
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000,
                2px 2px 0 #000,
                -2px 0 0 #000,
                2px 0 0 #000,
                0 -2px 0 #000,
                0 2px 0 #000;
        }
        .square.selected {
            background: #ffd700 !important;
            color: #000 !important;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            transform: scale(0.95);
            border-color: #000;
        }
        .square.valid-move {
            border: 3px solid #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.8);
        }
        .square.valid-move::after {
            content: '';
            position: absolute;
            width: min(20px, 25%);
            height: min(20px, 25%);
            background: #ffd700;
            border-radius: 50%;
            opacity: 0.6;
        }
        .square.in-check {
            background: #ff0000 !important;
            box-shadow: 0 0 20px rgba(255,0,0,0.8);
        }
        .square:active {
            transform: scale(0.92);
        }
        .side-panel {
            background: rgba(26, 26, 26, 0.9);
            border: 3px solid #ffd700;
            padding: 15px;
            box-shadow: 0 5px 20px rgba(255,215,0,0.3);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        .panel-title {
            font-size: 1.5em;
            letter-spacing: 3px;
            color: #ffd700;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ffd700;
        }
        .status-text {
            font-size: 1.1em;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: #fff;
        }
        .captured-section {
            margin: 10px 0;
        }
        .captured-title {
            font-size: 0.9em;
            color: #ffd700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .captured-pieces {
            font-size: 1.3em;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-left: 3px solid #ffd700;
            min-height: 35px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        .btn {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            border: none;
            padding: 12px 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1em;
            letter-spacing: 2px;
            color: #000;
            cursor: pointer;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(255,215,0,0.4);
            position: relative;
            overflow: hidden;
            font-weight: bold;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #444, #222);
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }
        .modal.hidden {
            display: none;
        }
        .modal-content {
            background: #1a1a1a;
            border: 4px solid #ffd700;
            padding: 30px 20px;
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
            box-shadow: 0 0 50px rgba(255,215,0,0.5);
            max-width: 90%;
        }
        .modal-title {
            font-size: 2.5em;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 3px 3px 0 #ffd700;
            text-align: center;
            margin-bottom: 15px;
        }
        .modal-subtitle {
            font-size: 1.2em;
            letter-spacing: 2px;
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .modal-buttons .btn {
            min-width: 140px;
        }
        .hint-flash {
            animation: hintPulse 1s ease-in-out;
        }
        @keyframes hintPulse {
            0%, 100% { 
                box-shadow: 0 0 0 rgba(255,215,0,0);
                border-color: transparent;
            }
            50% { 
                box-shadow: 0 0 30px rgba(255,215,0,1);
                border-color: #ffd700;
            }
        }
        
        /* Desktop layout */
        @media (min-width: 900px) {
            .container {
                padding: 20px;
            }
            .header {
                margin-bottom: 20px;
            }
            .title {
                font-size: 3em;
                letter-spacing: 6px;
            }
            .turn-display {
                padding: 12px 25px;
                font-size: 1.3em;
            }
            .game-wrapper {
                grid-template-columns: auto 350px;
                gap: 30px;
            }
            .board-container {
                max-width: none;
            }
            .side-panel {
                margin: 0;
            }
            .controls {
                grid-template-columns: 1fr;
            }
            .btn {
                padding: 15px 20px;
                font-size: 1.3em;
            }
            #newGameBtn::after {
                content: ' GAME';
            }
            #modeBtn::after {
                content: ' CHANGE';
            }
            .modal-content {
                padding: 50px 40px;
            }
            .modal-title {
                font-size: 3.5em;
                letter-spacing: 6px;
            }
        }
        
        /* Small mobile adjustments */
        @media (max-width: 400px) {
            .title { 
                font-size: 1.5em; 
                letter-spacing: 2px; 
            }
            .turn-display { 
                font-size: 0.85em; 
                padding: 6px 12px; 
            }
            .board {
                padding: 4px;
                gap: 1px;
            }
            .panel-title {
                font-size: 1.2em;
            }
            .status-text {
                font-size: 0.95em;
            }
            .captured-title {
                font-size: 0.8em;
            }
            .btn {
                font-size: 0.85em;
                padding: 10px 8px;
            }
            .modal-title {
                font-size: 2em;
            }
            .modal-subtitle {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="container">
        <div class="header">
            <div class="title">CHESS</div>
            <div class="turn-display" id="turnDisplay">WHITE'S MOVE</div>
        </div>
        
        <div class="game-wrapper">
            <div class="board-container">
                <div class="board" id="board"></div>
            </div>
            
            <div class="side-panel">
                <div class="panel-title">STATUS</div>
                <div class="status-text" id="statusText">SELECT YOUR PIECE</div>
                
                <div class="captured-section">
                    <div class="captured-title">WHITE CAPTURED</div>
                    <div class="captured-pieces" id="whiteCaptured">—</div>
                </div>
                
                <div class="captured-section">
                    <div class="captured-title">BLACK CAPTURED</div>
                    <div class="captured-pieces" id="blackCaptured">—</div>
                </div>
                
                <div class="controls">
                    <button class="btn" id="hintBtn">💡 HINT</button>
                    <button class="btn btn-secondary" id="newGameBtn">NEW</button>
                    <button class="btn btn-secondary" id="modeBtn">MODE</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="modeModal">
        <div class="modal-content">
            <div class="modal-title">CHOOSE MODE</div>
            <div class="modal-subtitle">SELECT YOUR CHALLENGE</div>
            <div class="modal-buttons">
                <button class="btn" onclick="startGame('ai')">🤖 VS AI</button>
                <button class="btn" onclick="startGame('2player')">👥 2 PLAYERS</button>
            </div>
        </div>
    </div>

    <div class="modal hidden" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title" id="gameOverTitle">CHECKMATE</div>
            <div class="modal-subtitle" id="gameOverText"></div>
            <button class="btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Unicode chess pieces
        const pieceSymbols = {
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙',
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'
        };

        // Initialize chess.js
        let chess = new Chess();
        let selectedSquare = null;
        let gameMode = 'ai';
        let gameActive = false;
        let captured = { white: [], black: [] };
        let lastMove = null;

        function squareToNotation(row, col) {
            return String.fromCharCode(97 + col) + (8 - row);
        }

        function notationToSquare(notation) {
            const col = notation.charCodeAt(0) - 97;
            const row = 8 - parseInt(notation[1]);
            return { row, col };
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            const board = chess.board();
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    const notation = squareToNotation(row, col);
                    square.className = 'square ' + ((row + col) % 2 === 0 ? 'light' : 'dark');
                    square.dataset.square = notation;
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    
                    // Highlight last move
                    if (lastMove && (notation === lastMove.from || notation === lastMove.to)) {
                        square.classList.add('last-move');
                    }
                    
                    const piece = board[row][col];
                    if (piece) {
                        const isWhite = piece.color === 'w';
                        const symbol = pieceSymbols[isWhite ? piece.type.toUpperCase() : piece.type];
                        const pieceSpan = document.createElement('span');
                        pieceSpan.className = isWhite ? 'white-piece' : 'black-piece';
                        pieceSpan.textContent = symbol;
                        square.appendChild(pieceSpan);
                    }
                    
                    boardEl.appendChild(square);
                }
            }
            
            // Highlight king in check
            if (chess.in_check()) {
                const turn = chess.turn();
                const kingSquare = findKingSquare(turn);
                if (kingSquare) {
                    const squares = document.querySelectorAll('.square');
                    const idx = kingSquare.row * 8 + kingSquare.col;
                    squares[idx].classList.add('in-check');
                }
            }
        }

        function findKingSquare(color) {
            const board = chess.board();
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const piece = board[row][col];
                    if (piece && piece.type === 'k' && piece.color === color) {
                        return { row, col };
                    }
                }
            }
            return null;
        }

        function handleSquareClick(row, col) {
            if (!gameActive) return;
            if (gameMode === 'ai' && chess.turn() === 'b') return;
            
            const clickedSquare = squareToNotation(row, col);
            const piece = chess.get(clickedSquare);
            
            // If a piece is selected, try to move
            if (selectedSquare) {
                const move = {
                    from: selectedSquare,
                    to: clickedSquare,
                    promotion: 'q' // Always promote to queen for simplicity
                };
                
                const result = chess.move(move);
                
                if (result) {
                    // Valid move - track it
                    lastMove = { from: move.from, to: move.to };
                    
                    if (result.captured) {
                        const captureColor = result.color === 'w' ? 'white' : 'black';
                        captured[captureColor].push(pieceSymbols[result.captured.toUpperCase()]);
                        updateCaptured();
                    }
                    
                    clearSelection();
                    createBoard();
                    checkGameStatus();
                    
                    // AI move
                    if (gameMode === 'ai' && chess.turn() === 'b' && !chess.game_over()) {
                        updateStatus('AI THINKING...');
                        setTimeout(aiMove, 600);
                    }
                } else {
                    // Invalid move, maybe selecting a new piece
                    clearSelection();
                    if (piece && piece.color === chess.turn()) {
                        selectSquare(row, col, clickedSquare);
                    }
                }
            } else {
                // Select a piece
                if (piece && piece.color === chess.turn()) {
                    selectSquare(row, col, clickedSquare);
                }
            }
        }

        function selectSquare(row, col, notation) {
            selectedSquare = notation;
            const moves = chess.moves({ square: notation, verbose: true });
            
            // Highlight selected square
            const squares = document.querySelectorAll('.square');
            const index = row * 8 + col;
            squares[index].classList.add('selected');
            
            // Highlight valid moves
            moves.forEach(move => {
                const toSquare = notationToSquare(move.to);
                const idx = toSquare.row * 8 + toSquare.col;
                squares[idx].classList.add('valid-move');
            });
            
            const piece = chess.get(notation);
            const moveCount = moves.length;
            updateStatus(`${piece.type.toUpperCase()} SELECTED - ${moveCount} MOVES`);
        }

        function clearSelection() {
            document.querySelectorAll('.square').forEach(sq => {
                sq.classList.remove('selected', 'valid-move');
            });
            selectedSquare = null;
        }

        function aiMove() {
            const moves = chess.moves({ verbose: true });
            if (moves.length === 0) return;
            
            // Simple AI with scoring
            let bestMove = null;
            let bestScore = -Infinity;
            
            moves.forEach(move => {
                let score = Math.random() * 5;
                
                // Prioritize captures
                if (move.captured) {
                    const pieceValues = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 100 };
                    score += pieceValues[move.captured] * 10;
                }
                
                // Prefer center control
                const toSquare = notationToSquare(move.to);
                const centerDist = Math.abs(toSquare.row - 3.5) + Math.abs(toSquare.col - 3.5);
                score -= centerDist;
                
                // Avoid moving into check (chess.js handles this)
                // Prefer checks
                chess.move(move);
                if (chess.in_check()) {
                    score += 15;
                }
                chess.undo();
                
                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            });
            
            if (bestMove) {
                const result = chess.move(bestMove);
                lastMove = { from: bestMove.from, to: bestMove.to };
                
                if (result.captured) {
                    captured.black.push(pieceSymbols[result.captured.toUpperCase()]);
                    updateCaptured();
                }
                createBoard();
                checkGameStatus();
            }
        }

        function checkGameStatus() {
            if (chess.in_checkmate()) {
                const winner = chess.turn() === 'w' ? 'BLACK' : 'WHITE';
                endGame(`${winner} WINS BY CHECKMATE!`);
            } else if (chess.in_stalemate()) {
                endGame("STALEMATE - IT'S A DRAW!");
            } else if (chess.in_threefold_repetition()) {
                endGame("DRAW BY REPETITION!");
            } else if (chess.insufficient_material()) {
                endGame("DRAW - INSUFFICIENT MATERIAL!");
            } else if (chess.in_draw()) {
                endGame("IT'S A DRAW!");
            } else {
                updateTurnDisplay();
                if (chess.in_check()) {
                    updateStatus('CHECK! KING IN DANGER');
                } else {
                    updateStatus('SELECT YOUR PIECE');
                }
            }
        }

        function showHint() {
            if (!gameActive || chess.turn() !== 'w') return;
            
            const moves = chess.moves({ verbose: true });
            if (moves.length === 0) return;
            
            let bestMove = moves[0];
            let bestScore = -Infinity;
            
            moves.forEach(move => {
                let score = 0;
                if (move.captured) {
                    const pieceValues = { p: 1, n: 3, b: 3, r: 5, q: 9 };
                    score += pieceValues[move.captured] * 10;
                }
                
                chess.move(move);
                if (chess.in_check()) score += 15;
                chess.undo();
                
                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            });
            
            const fromSquare = notationToSquare(bestMove.from);
            const squares = document.querySelectorAll('.square');
            const idx = fromSquare.row * 8 + fromSquare.col;
            squares[idx].classList.add('hint-flash');
            setTimeout(() => squares[idx].classList.remove('hint-flash'), 1000);
        }

        function startGame(mode) {
            gameMode = mode;
            gameActive = true;
            lastMove = null;
            document.getElementById('modeModal').classList.add('hidden');
            updateStatus('SELECT YOUR PIECE');
        }

        function resetGame() {
            chess.reset();
            captured = { white: [], black: [] };
            lastMove = null;
            clearSelection();
            createBoard();
            gameActive = true;
            document.getElementById('gameOverModal').classList.add('hidden');
            updateTurnDisplay();
            updateStatus('SELECT YOUR PIECE');
            updateCaptured();
        }

        function endGame(message) {
            gameActive = false;
            document.getElementById('gameOverTitle').textContent = 'GAME OVER';
            document.getElementById('gameOverText').textContent = message;
            document.getElementById('gameOverModal').classList.remove('hidden');
        }

        function updateTurnDisplay() {
            const turn = chess.turn() === 'w' ? 'WHITE' : 'BLACK';
            document.getElementById('turnDisplay').textContent = `${turn}'S MOVE`;
        }

        function updateStatus(text) {
            document.getElementById('statusText').textContent = text;
        }

        function updateCaptured() {
            document.getElementById('whiteCaptured').textContent = 
                captured.white.join(' ') || '—';
            document.getElementById('blackCaptured').textContent = 
                captured.black.join(' ') || '—';
        }

        // Event listeners
        document.getElementById('newGameBtn').addEventListener('click', resetGame);
        document.getElementById('modeBtn').addEventListener('click', () => {
            document.getElementById('modeModal').classList.remove('hidden');
            gameActive = false;
        });
        document.getElementById('hintBtn').addEventListener('click', showHint);

        // Initialize
        createBoard();
        document.getElementById('modeModal').classList.remove('hidden');
    </script>
</body>
</html>
