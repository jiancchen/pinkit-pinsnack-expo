<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard | Utility</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .location {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .date {
            color: #666;
            font-size: 14px;
        }
        
        .current-weather {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            border-radius: 15px;
            color: white;
        }
        
        .weather-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .temperature {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 5px;
        }
        
        .description {
            font-size: 18px;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        
        .feels-like {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .detail-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .detail-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .detail-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .forecast {
            margin-bottom: 20px;
        }
        
        .forecast-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .forecast-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .forecast-day {
            font-weight: 500;
            color: #333;
            flex: 1;
        }
        
        .forecast-icon {
            font-size: 20px;
            margin: 0 10px;
        }
        
        .forecast-temps {
            display: flex;
            gap: 8px;
            font-size: 14px;
        }
        
        .forecast-high {
            font-weight: 600;
            color: #333;
        }
        
        .forecast-low {
            color: #666;
        }
        
        .refresh-btn {
            width: 100%;
            padding: 12px;
            background: #74b9ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .refresh-btn:hover {
            background: #0984e3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="location" id="location">San Francisco, CA</div>
            <div class="date" id="date"></div>
        </div>
        
        <div class="current-weather">
            <div class="weather-icon" id="current-icon">☀️</div>
            <div class="temperature" id="temperature">72°</div>
            <div class="description" id="description">Sunny</div>
            <div class="feels-like" id="feels-like">Feels like 75°</div>
        </div>
        
        <div class="details">
            <div class="detail-item">
                <div class="detail-icon">💨</div>
                <div class="detail-label">Wind</div>
                <div class="detail-value" id="wind">8 mph</div>
            </div>
            <div class="detail-item">
                <div class="detail-icon">💧</div>
                <div class="detail-label">Humidity</div>
                <div class="detail-value" id="humidity">65%</div>
            </div>
            <div class="detail-item">
                <div class="detail-icon">👁️</div>
                <div class="detail-label">Visibility</div>
                <div class="detail-value" id="visibility">10 mi</div>
            </div>
            <div class="detail-item">
                <div class="detail-icon">🌡️</div>
                <div class="detail-label">Pressure</div>
                <div class="detail-value" id="pressure">30.2 in</div>
            </div>
        </div>
        
        <div class="forecast">
            <div class="forecast-title">5-Day Forecast</div>
            <div id="forecast-list"></div>
        </div>
        
        <button class="refresh-btn" onclick="refreshWeather()">
            🔄 Refresh Weather
        </button>
    </div>

    <script>
        const weatherData = {
            locations: [
                'San Francisco, CA',
                'New York, NY',
                'Los Angeles, CA',
                'Chicago, IL',
                'Miami, FL',
                'Seattle, WA',
                'Austin, TX'
            ],
            
            conditions: [
                { icon: '☀️', desc: 'Sunny', temp: [70, 85] },
                { icon: '⛅', desc: 'Partly Cloudy', temp: [65, 80] },
                { icon: '☁️', desc: 'Cloudy', temp: [60, 75] },
                { icon: '🌧️', desc: 'Rainy', temp: [55, 70] },
                { icon: '⛈️', desc: 'Thunderstorms', temp: [60, 78] },
                { icon: '🌨️', desc: 'Snow', temp: [25, 40] },
                { icon: '🌫️', desc: 'Foggy', temp: [50, 65] }
            ]
        };
        
        function getRandomWeather() {
            const condition = weatherData.conditions[Math.floor(Math.random() * weatherData.conditions.length)];
            const temp = Math.floor(Math.random() * (condition.temp[1] - condition.temp[0] + 1)) + condition.temp[0];
            
            return {
                icon: condition.icon,
                description: condition.desc,
                temperature: temp,
                feelsLike: temp + Math.floor(Math.random() * 6) - 3,
                wind: Math.floor(Math.random() * 15) + 3,
                humidity: Math.floor(Math.random() * 40) + 40,
                visibility: Math.floor(Math.random() * 8) + 5,
                pressure: (29.8 + Math.random() * 0.8).toFixed(1)
            };
        }
        
        function updateCurrentWeather() {
            const weather = getRandomWeather();
            
            document.getElementById('current-icon').textContent = weather.icon;
            document.getElementById('temperature').textContent = `${weather.temperature}°`;
            document.getElementById('description').textContent = weather.description;
            document.getElementById('feels-like').textContent = `Feels like ${weather.feelsLike}°`;
            document.getElementById('wind').textContent = `${weather.wind} mph`;
            document.getElementById('humidity').textContent = `${weather.humidity}%`;
            document.getElementById('visibility').textContent = `${weather.visibility} mi`;
            document.getElementById('pressure').textContent = `${weather.pressure} in`;
        }
        
        function updateForecast() {
            const forecastList = document.getElementById('forecast-list');
            forecastList.innerHTML = '';
            
            const days = ['Today', 'Tomorrow', 'Wednesday', 'Thursday', 'Friday'];
            
            days.forEach(day => {
                const weather = getRandomWeather();
                const lowTemp = weather.temperature - Math.floor(Math.random() * 10) - 5;
                
                const item = document.createElement('div');
                item.className = 'forecast-item';
                item.innerHTML = `
                    <div class="forecast-day">${day}</div>
                    <div class="forecast-icon">${weather.icon}</div>
                    <div class="forecast-temps">
                        <span class="forecast-high">${weather.temperature}°</span>
                        <span class="forecast-low">${lowTemp}°</span>
                    </div>
                `;
                forecastList.appendChild(item);
            });
        }
        
        function updateLocation() {
            const location = weatherData.locations[Math.floor(Math.random() * weatherData.locations.length)];
            document.getElementById('location').textContent = location;
        }
        
        function updateDate() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }
        
        function refreshWeather() {
            updateCurrentWeather();
            updateForecast();
            updateLocation();
            
            // Add a small animation
            const container = document.querySelector('.container');
            container.style.transform = 'scale(0.98)';
            setTimeout(() => {
                container.style.transform = 'scale(1)';
            }, 100);
        }
        
        // Initialize
        updateDate();
        updateCurrentWeather();
        updateForecast();
        
        // Auto-refresh every 5 minutes
        setInterval(refreshWeather, 5 * 60 * 1000);
        
        // Save preferences
        const preferences = JSON.parse(localStorage.getItem('weather-prefs') || '{}');
        if (!preferences.lastUpdate) {
            preferences.lastUpdate = new Date().toISOString();
            preferences.favoriteLocation = 'San Francisco, CA';
            localStorage.setItem('weather-prefs', JSON.stringify(preferences));
        }
    </script>
</body>
</html>
