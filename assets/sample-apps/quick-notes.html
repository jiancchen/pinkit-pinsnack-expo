<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes | Productivity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #88d8a3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #2d3436;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .stats {
            color: #636e72;
            font-size: 14px;
        }
        
        .new-note {
            margin-bottom: 30px;
        }
        
        .note-input {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .note-input:focus {
            border-color: #a8e6cf;
        }
        
        .note-input::placeholder {
            color: #999;
        }
        
        .note-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #a8e6cf;
            color: #2d3436;
        }
        
        .btn-primary:hover {
            background: #88d8a3;
        }
        
        .btn-secondary {
            background: #ddd;
            color: #636e72;
        }
        
        .btn-secondary:hover {
            background: #bbb;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        
        .search-input:focus {
            border-color: #a8e6cf;
        }
        
        .notes-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .note-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .note-item:hover {
            background: #e9ecef;
            transform: translateY(-1px);
        }
        
        .note-preview {
            color: #2d3436;
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 8px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #636e72;
        }
        
        .note-date {
            flex: 1;
        }
        
        .note-actions-small {
            display: flex;
            gap: 8px;
        }
        
        .btn-small {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-edit {
            background: #74b9ff;
            color: white;
        }
        
        .btn-edit:hover {
            background: #0984e3;
        }
        
        .btn-delete {
            background: #fd79a8;
            color: white;
        }
        
        .btn-delete:hover {
            background: #e84393;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #636e72;
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Quick Notes</h1>
            <div class="stats" id="stats">0 notes</div>
        </div>
        
        <div class="new-note">
            <textarea 
                class="note-input" 
                id="noteInput"
                placeholder="Write your note here..."
                maxlength="1000"
            ></textarea>
            <div class="note-actions">
                <button class="btn btn-primary" onclick="saveNote()">💾 Save Note</button>
                <button class="btn btn-secondary" onclick="clearInput()">🗑️ Clear</button>
            </div>
        </div>
        
        <div class="search-box">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput"
                placeholder="🔍 Search notes..."
                oninput="filterNotes()"
            >
        </div>
        
        <div class="notes-list" id="notesList">
            <div class="empty-state">
                <div class="icon">📄</div>
                <div>No notes yet. Create your first note above!</div>
            </div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Note</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <textarea 
                class="note-input" 
                id="editNoteInput"
                maxlength="1000"
            ></textarea>
            <div class="note-actions">
                <button class="btn btn-primary" onclick="updateNote()">💾 Update</button>
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('quick-notes') || '[]');
        let editingNoteId = null;
        
        function saveNotes() {
            localStorage.setItem('quick-notes', JSON.stringify(notes));
            updateStats();
            renderNotes();
        }
        
        function saveNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            
            if (text) {
                const note = {
                    id: Date.now(),
                    text: text,
                    created: new Date().toISOString(),
                    modified: new Date().toISOString()
                };
                
                notes.unshift(note);
                input.value = '';
                saveNotes();
            }
        }
        
        function deleteNote(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes = notes.filter(note => note.id !== id);
                saveNotes();
            }
        }
        
        function editNote(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                editingNoteId = id;
                document.getElementById('editNoteInput').value = note.text;
                document.getElementById('editModal').style.display = 'block';
            }
        }
        
        function updateNote() {
            const text = document.getElementById('editNoteInput').value.trim();
            if (text && editingNoteId) {
                const noteIndex = notes.findIndex(n => n.id === editingNoteId);
                if (noteIndex !== -1) {
                    notes[noteIndex].text = text;
                    notes[noteIndex].modified = new Date().toISOString();
                    saveNotes();
                }
            }
            closeEditModal();
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            editingNoteId = null;
        }
        
        function clearInput() {
            document.getElementById('noteInput').value = '';
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 1) {
                return 'Today';
            } else if (diffDays === 2) {
                return 'Yesterday';
            } else if (diffDays <= 7) {
                return `${diffDays - 1} days ago`;
            } else {
                return date.toLocaleDateString();
            }
        }
        
        function renderNotes(filteredNotes = notes) {
            const notesList = document.getElementById('notesList');
            
            if (filteredNotes.length === 0) {
                notesList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📄</div>
                        <div>${notes.length === 0 ? 'No notes yet. Create your first note above!' : 'No notes found.'}</div>
                    </div>
                `;
                return;
            }
            
            notesList.innerHTML = filteredNotes.map(note => `
                <div class="note-item">
                    <div class="note-preview">${note.text}</div>
                    <div class="note-meta">
                        <div class="note-date">${formatDate(note.created)}</div>
                        <div class="note-actions-small">
                            <button class="btn-small btn-edit" onclick="editNote(${note.id})">Edit</button>
                            <button class="btn-small btn-delete" onclick="deleteNote(${note.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function filterNotes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = notes.filter(note => 
                note.text.toLowerCase().includes(searchTerm)
            );
            renderNotes(filtered);
        }
        
        function updateStats() {
            const stats = document.getElementById('stats');
            stats.textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 's') {
                    e.preventDefault();
                    saveNote();
                }
            }
            
            if (e.key === 'Escape') {
                closeEditModal();
            }
        });
        
        // Auto-save draft
        let draftTimer;
        document.getElementById('noteInput').addEventListener('input', function() {
            clearTimeout(draftTimer);
            draftTimer = setTimeout(() => {
                localStorage.setItem('note-draft', this.value);
            }, 500);
        });
        
        // Restore draft
        const draft = localStorage.getItem('note-draft');
        if (draft) {
            document.getElementById('noteInput').value = draft;
        }
        
        // Initialize
        renderNotes();
        updateStats();
        
        // Add sample notes if empty
        if (notes.length === 0) {
            notes = [
                {
                    id: Date.now() - 1000,
                    text: "Welcome to Quick Notes! This is your first note. You can edit or delete it.",
                    created: new Date().toISOString(),
                    modified: new Date().toISOString()
                },
                {
                    id: Date.now() - 2000,
                    text: "Use Ctrl+S (or Cmd+S) to quickly save notes. Search works in real-time!",
                    created: new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString(),
                    modified: new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString()
                }
            ];
            saveNotes();
        }
    </script>
</body>
</html>
